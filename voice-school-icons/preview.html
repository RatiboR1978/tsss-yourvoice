<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice School Icons Preview</title>
  <style>
    :root {
      --bg: #0B0D16;
      --card: #171923;
      --gold: #D8A64A;
      --ivory: #F5EFE3;
      --muted: #8F94C8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ivory);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 32px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      max-width: 980px;
    }

    .item {
      min-height: 132px;
      border: 1px solid rgba(216, 166, 74, .18);
      border-radius: 8px;
      background: var(--card);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    img {
      width: 64px;
      height: 64px;
      display: block;
    }

    .sizes {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .sizes img:first-child {
      width: 32px;
      height: 32px;
    }
  </style>
</head>
<body>
  <h1>Voice School Icons Preview</h1>
  <main class="grid">
    <div class="item"><div class="sizes"><img src="01-market-growth.svg" alt=""><img src="01-market-growth.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="02-voice-talent-shortage.svg" alt=""><img src="02-voice-talent-shortage.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="03-application-markets.svg" alt=""><img src="03-application-markets.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="04-career-switcher.svg" alt=""><img src="04-career-switcher.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="05-future-star.svg" alt=""><img src="05-future-star.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="06-experienced-practitioner.svg" alt=""><img src="06-experienced-practitioner.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="07-beginner-from-zero.svg" alt=""><img src="07-beginner-from-zero.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="08-video-lessons.svg" alt=""><img src="08-video-lessons.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="09-chat-microphone.svg" alt=""><img src="09-chat-microphone.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="10-webinars-assignments.svg" alt=""><img src="10-webinars-assignments.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="11-practice-day-one.svg" alt=""><img src="11-practice-day-one.svg" alt=""></div></div>
    <div class="item"><div class="sizes"><img src="12-certificate-portfolio.svg" alt=""><img src="12-certificate-portfolio.svg" alt=""></div></div>
  </main>
</body>
</html>
